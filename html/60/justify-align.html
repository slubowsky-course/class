<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      body {
        display: grid;
        gap: 1em;

        grid-auto-rows: 150px;
        grid-auto-columns: 150px;

        justify-content: center;
        /*align-items: /*stretch* / center;*/

        grid-template-columns: [start] 150px [mid-left] 150px [mid-right] 150px [end];
      }

      div:nth-child(1) {
        background-color: aqua;
        /*grid-column: 1 / 3;*/
        grid-column: start / mid-right;
        grid-row: 1;

        align-self: /*start*/ center;
        justify-self: center;
      }

      div:nth-child(2) {
        background-color:chartreuse;
        /*grid-column: 3;*/
        grid-column: mid-right;
        grid-row: 1 / 4;
      }

      div:nth-child(3) {
        background-color:crimson;
        grid-column: 2 / 4;
        grid-row: 4;
      }

      div:nth-child(4) {
        background-color:orange;
        grid-column: 1;
        grid-row: 2 / 5;
      }
    </style>
  </head>
  <body>
    <div>1</div>
    <div>2</div>
    <div>3</div>
    <div>4</div>
  </body>
</html>
