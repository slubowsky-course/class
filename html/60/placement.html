<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      div:nth-child(even) {
        background-color: bisque;
      }

      div:nth-child(odd) {
        background-color: cadetblue;
      }

      body {
        display: grid;
        gap: 1em;

        grid-template-rows: repeat(3, 100px);

        /*grid-auto-flow: column;*/
        grid-auto-flow: column dense;
        grid-auto-columns: 250px;
      }

      div:nth-child(3) {
        /*order: -1;
        grid-column-start: span 2;*/
        grid-column-end: span 2;
      }

      div:nth-child(7) {
        grid-column-end: span 2;
      }

      div:nth-child(4) {
        /*grid-column-start: 3;
        grid-column-end: 5;*/
        /*grid-column: 3 / 5;*/
        grid-column: 3 / span 2;
      }

      div:nth-child(6) {
        /*grid-row-start: 3;
        grid-row-end: 5;*/
        /*grid-row: 3 / 5;*/
        grid-row: 3 / span 2;
      }
    </style>
  </head>
  <body>
    <div>1</div>
    <div>2</div>
    <div>3</div>
    <div>4</div>
    <div>5</div>
    <div>6</div>
    <div>7</div>
    <div>8</div>
  </body>
</html>
