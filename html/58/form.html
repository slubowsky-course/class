<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      body {
        width: 80%;
        margin: auto;
      }

      input:not(type=radio),
      textarea {
        width: 100%;
        margin-bottom: 0.5em;
      }

      datalist {
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        writing-mode: vertical-lr;
        width: 200px;
      }

      option {
        padding: 0;
      }

      input[type='range'] {
        width: 200px;
        margin: 0;
      }

      /*textarea {
        width: 20em;
        height: 10em;
      }*/
    </style>
  </head>
  <body>
    <form method="post" action="foo">
      <label>
        First Name:
        <input name="first" value="Joe" required />
      </label>

      <label for="last">Last Name</label>
      <input name="last" id="last" />

      <label>
        Password:
        <input type="password" name="password" minlength="5" maxlength="8" placeholder="Please enter your password" />
      </label>

      <label>
        Age:
        <input type="number" min="5" max="100" step="any" name="age" />
      </label>

      <label>
        Email:
        <input type="email" name="email" />
      </label>

      <label>
        Color:
        <input type="color" name="color" value="#c73333" />
      </label>

      <label>
        Birthday:
        <input type="date" name="birthday" value="2024-01-01" />
      </label>

      <label>
        Favorite month:
        <input type="month" name="month" value="2024-02" />
      </label>

      <label>
        Favorite week:
        <input type="week" name="week" value="2024-W06" />
      </label>

      <label>
        Phone number:
        <input type="tel" name="telephone" value="1234567890" />
      </label>

      <label>
        Score:
        <input type="range" name="score" value="30" min="25" max="35" step="2" />
      </label>

      <label for="temp">Choose a comfortable temperature:</label><br />
      <input type="range" id="temp" name="temp" list="markers" />

      <datalist id="markers">
        <option value="0"></option>
        <option value="10"></option>
        <option value="25"></option>
        <option value="50"></option>
        <option value="75"></option>
        <option value="100"></option>
      </datalist>

      <label for="tempB">Choose a comfortable temperature:</label><br />
      <input type="range" id="tempB" name="temp" list="values" />

      <datalist id="values">
        <option value="0" label="very cold!"></option>
        <option value="25" label="cool"></option>
        <option value="50" label="medium"></option>
        <option value="75" label="getting warm!"></option>
        <option value="100" label="hot!"></option>
      </datalist>

      <label>
        Comments:
        <textarea name="comments" placeholder="Please leave a nice comment here" xrows="10" xcols="30">
this is actually filled out</textarea
        >
      </label>

      <div>
        <label>
          Your pick for president:
          <input type="radio" name="president" value="trump" checked />Trump
          <input type="radio" name="president" required value="biden" />Biden
        </label>
      </div>

      <div>
        side:
        <label><input type="checkbox" name="side" value="fries" />Fries</label>
        <input type="checkbox" name="side" value="onion rings" checked />Onion Rings
      </div>

      <div>
        soda:
        <input type="checkbox" name="coke" />Coke <input type="checkbox" name="pepsi" />Pepsi
      </div>

      <div>
        <label
          >state
          <select name="state">
            <option hidden>Pick a state</option>
            <option value="1">NY</option>
            <option>NJ</option>
          </select>
        </label>
      </div>

      <input type="submit" value="register"/>

      <button>please click to register<img src="restaurant/images/hamburger.jpg"></button>

      <button type="reset">reset</button>
      <input type="reset">

      <button type="button">click me!</button>
      <input type="button" value="Im a button">
    </form>
  </body>
</html>
