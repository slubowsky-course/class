<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      body {
        display: grid;
        gap: 1em;

        grid-auto-rows: 150px;
        grid-auto-columns: 150px;

        justify-content:center;

        height: 2000px;
        align-content: center;

        /*justify-items: center;
        align-items: center;*/
      }
      div:nth-child(1) {
        background-color: #ffdab9;

        grid-column: 1/3;
        grid-row: 1;

        justify-self: start;
      }

      div:nth-child(2) {
        background-color: gainsboro;

        grid-column: 3;
        grid-row: 1/4;

        align-self: start;
      }

      div:nth-child(3) {
        background-color:aqua;
        grid-row: 4;
        grid-column: 2/4;
      }

      div:nth-child(4) {
        background-color:gold;
        grid-row: 2/5;
        grid-column: 1;
      }
    </style>
  </head>
  <body>
    <div>1</div>
    <div>2</div>
    <div>3</div>
    <div>4</div>
  </body>
</html>
