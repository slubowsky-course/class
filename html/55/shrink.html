<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    body {
      display: grid;

      grid-template-columns: 1fr minmax(min-content, max-content) 1fr;

      text-align: center;
    }

    header, hr, img {
      grid-column-start: 2;
    }

    img {
      width: 100%;
    }


    hr {
      width: 100%;
    }
  </style>
</head>
<body>
  <header>
    <h1>PCS Responsive Shrinking Demo</h1>
    <h2>Multiple levels of shrinking</h2>
  </header>
  <hr>
  <img src="animal.jpg" alt="animal">
</body>
</html>
