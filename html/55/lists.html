<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>

  <style>
    ol {
      list-style-type: hebrew;
    }

    ul {
      list-style-type: decimal;
    }

    .arrow-list {
      list-style-image: url(arrow.png);
      margin-left: 1.5em;
    }

    img {
      vertical-align: middle;
    }

    .inline-list, .inline-list li {
      display: inline;
      padding-left: 0;
    }
  </style>
</head>
<body>
  <h1>lists</h1>

  <h2>Creating a web page</h2>
  <ol>
    <li>Write HTML</li>
    <li>Add CSS</li>
    <li>Add JavaScript</li>
  </ol>

  <h2>Shopping list</h2>
  <ul>
    <li>Bread</li>
    <li>Milk</li>
    <li>Coffee</li>
  </ul>

  <h2>Things to do</h2>
  <ul class="arrow-list">
    <li>Do homework</li>
    <li>Go to sleep</li>
    <li>Wake up</li>
  </ul>

  <div>
    <img src="arrow.png" alt="">
    <span>some text</span>
  </div>

  <h2>Inline List</h2>
  <ul class="inline-list">
    <li>Thing one</li>
    <li>Thing Two</li>
    <li>Thing Three</li>
  </ul>
</body>
</html>
