<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    ul {
      list-style: none;
      padding: 0;
    }

    a {
      background-repeat: no-repeat;
      height: 64px;
      display: inline-block;
      padding-left: 66px;
      line-height: 64px;
    }

    /* = */
    /*a[href="myResume.docx"] {
      background-image: url(images/word.png);
    }*/

    /* starts with */
    /*a[href^="myResume"] {
      background-image: url(images/word.png);
    }*/

    /* contains */
    /*a[href*=".doc"] {
      background-image: url(images/word.png);
    }*/

    /* ends with*/
    a[href$=".doc"], a[href$=".docx"] {
      background-image: url(images/word.png);
    }

    a[href$=".ppt"], a[href$=".pptx"] {
      background-image: url(images/powerpoint.png);
    }

    .word {
    /*a[class="word"] {*/
      color: red;
    }

    [data-pcs="5"] {
      border: 1px solid black;
    }

    [pcs] {
      rotate: 2deg;
    }

    /*.word {
      background-image: url(images/word.png);
    }

    .ppt {
      background-image: url(images/powerpoint.png);
    }*/

  </style>
</head>
<body>
  <ul>
    <li><a data-pcs="5" class="word" href="myResume.docx">myResume.docx</a></li>
    <li><a pcs class="word" href="myProjects.doc">myProjects.doc</a></li>
    <li><a class="ppt" href="myPresentation.doc.ppt">myPresentation.doc.pptx</a></li>
  </ul>
</body>
</html>
