<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      header {
        text-align: center;
      }
      table {
        /*border: 1px solid black;*/
        border-collapse: collapse;

        width: 80%;
        margin: auto;
      }

      th,
      td {
        border: 1px solid black;
      }

      caption {
        caption-side: bottom;
      }

      tfoot {
        color: red;
      }

      td:not(td:first-child) {
        text-align: right;
      }

      td:first-child {
        font-weight: bold;
      }

      /*.odd {
        background-color:aqua;
      }

      .even {
        background-color: aquamarine;
      }*/

      /*tr:nth-child(3) {
        background-color: pink;
      }*/

      /* even */
      tbody tr:nth-child(2n) {
        background-color: pink;
      }

      /* odd */
      tbody tr:nth-child(2n + 1) {
        background-color: hotpink;
      }

      /* first 3 */
      tbody tr:nth-child(-n+3) {
        background-color: blanchedalmond;
      }

      tbody tr:nth-child(even) {
        background-color: pink;
      }

      tbody tr:nth-child(odd) {
        background-color: hotpink;
      }

      tbody tr:hover {
        background-color: dodgerblue /*!important*/;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>PCS</h1>
    </header>

    <table>
      <caption>
        students per year
      </caption>
      <thead>
        <tr>
          <th>year</th>
          <th>programing</th>
          <th>real estate</th>
          <th>accounting</th>
        </tr>
      </thead>
      <tbody>
        <tr class="odd">
          <td>2023</td>
          <td>46</td>
          <td>67</td>
          <td>31</td>
        </tr>
        <tr class="even">
          <td>2024</td>
          <td>47</td>
          <td>68</td>
          <td>32</td>
        </tr>
        <tr class="odd">
          <td>2025</td>
          <td>52</td>
          <td>73</td>
          <td>35</td>
        </tr>
        <tr class="even">
          <td rowspan="2">2026</td>
          <td>50</td>
          <td>75</td>
          <td>33</td>
        </tr>
        <tr class="even">
          <td colspan="4">Hi</td>
        </tr>
      </tbody>
      <tfoot>
        <tr>
          <td></td>
          <td>500</td>
          <td>333</td>
          <td>456</td>
        </tr>
      </tfoot>
    </table>
  </body>
</html>
