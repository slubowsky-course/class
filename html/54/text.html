      body {

      p {
        text-align: justify;

        text-transform: uppercase;
        text-shadow: 2px 2px 2px red, -2px -2px 2px black;
        /*transform: rotate(8deg)*/;
        rotate: 8deg;
        transform: scale(1.5, 1.25);
        transform: translate(30px, 36px);
      }
    </style>
