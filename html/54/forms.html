<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      input:not([type='submit'], [type='radio'], [type='checkbox']),
      textarea {
        width: 100%;
        box-sizing: border-box;
        margin-bottom: 0.5em;
      }

      textarea {
        height: 5em;
      }

      datalist {
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        writing-mode: vertical-lr;
        width: 200px;
      }

      option {
        padding: 0;
      }

      input[type='range'] {
        width: 200px;
        margin: 0;
      }
    </style>
  </head>
  <body>
    <form action="foo.php">
      <label>
        first name:
        <input name="first" minlength="3" maxlength="7" required value="Donald" placeholder="first" />
      </label>

      <label for="last">last name: </label>
      <input name="last" id="last" placeholder="last" />

      <label for="password">password</label>
      <input
        type="password"
        name="password"
        id="password"
        placeholder="enter password"
        pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}"
        title="Must contain at least one number, one uppercase letter, one lowercase letter, and at least 8 characters"
      />

      <label for="email">email</label>
      <input type="email" name="email" />

      <label for="age">age</label>
      <input type="number" name="age" id="age" min="0" max="120" step="any" />

      <label for="birthday">birthday</label>
      <input type="date" name="birthday" id="birthday" min="1900-01-01" max="2026-12-31" value="2026-07-05" />

      <label for="month">favorite month</label>
      <input type="month" name="month" id="month" />

      <label for="week">favorite week</label>
      <input type="week" name="week" id="week" />

      <label for="color">favorite color</label>
      <input type="color" name="color" id="color" value="#184d14" />

      <label for="phone">phone</label>
      <input type="tel" name="phone" id="phone" pattern="[0-9]{3}-[0-9]{3}-[0-9]{4}" placeholder="xxx-xxx-xxxx" />

      <label for="rating">rating</label>
      <input type="range" name="rating" id="rating" min="1" max="5" />

      <label for="tempB">Choose a comfortable temperature:</label><br />
      <input type="range" id="tempB" name="temp" list="values" />

      <datalist id="values">
        <option value="0" label="very cold!"></option>
        <option value="25" label="cool"></option>
        <option value="50" label="medium"></option>
        <option value="75" label="getting warm!"></option>
        <option value="100" label="hot!"></option>
      </datalist>

      <label for="comments">comments</label>
      <textarea name="comments" id="comments" placeholder="add comment here">i am the value</textarea>

      <div>
        <label for="flavor"
          >favorite flavor

          <input type="radio" name="flavor" value="chocolate" checked />chocolate

          <input type="radio" name="flavor" value="vanilla" />vanilla
        </label>

        <div>
          <label for="drink"
            >sides: <input type="checkbox" name="coke" />coke
            <label> <input type="checkbox" name="pepsi" />pepsi </label>
          </label>
        </div>

        <div>
          <label for="sides"
            >sides: <input type="checkbox" name="sides" value="fries" />fries
            <input type="checkbox" name="sides" value="onionrings" checked />onion rings
          </label>
        </div>
      </div>

      <div>
        <label for="state">Your state</label>
        <select name="state" id="state" required placeholder="choose state">
          <option hidden>select a state</option>
          <option value="1">NY</option>
          <option xselected>NJ</option>
          <option>FL</option>
        </select>
      </div>

      <input type="submit" value="do the submit"/>
      <button type="submit">
        Click Me!
        <img src="../53/images/powerpoint.png" alt="">
      </button>

      <input type="reset">
      <button type="reset">reset me</button>

      <input type="button" value="I do nothing without JS">

    </form>

    <input type="submit" value="I do nothing because im not in a form">
    <input type="text">
  </body>
</html>
