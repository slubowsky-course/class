<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="/chat.css" />
  </head>
  <body>
    <form id="login">
      <div id="error"></div>
      <input id="name" placeholder="choose a username" required />
      <button>join</button>
    </form>
    <div id="messagesContainer">
      <div id="messages"></div>
      <form id="messageForm">
        <input name="message" id="messageInput" required />
        <button>send</button>
      </form>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="chat.js"></script>
  </body>
</html>
